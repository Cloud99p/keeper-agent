services:
  # A2MCP API Server — OKX.AI Agent Service Provider
  - type: web
    name: solana-mev-agent-okx
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: npm install
    startCommand: npx tsx src/a2mcp-server.ts
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: RPC_URL
        value: https://api.mainnet-beta.solana.com
      - key: AGENT_ID
        value: "3325"
      - key: AGENT_NAME
        value: "Keeper Agent"
      - key: AGENT_VERSION
        value: "2.0.0-a2mcp"
      - key: PRICE_PER_BUNDLE
        value: "10"
      - key: PRICE_PER_ANALYSIS
        value: "5"
      - key: X402_ENABLED
        value: "false"
      - key: X402_WALLET
        sync: false
    healthCheckPath: /api/v1/health
    autoDeploy: true
