services:
  # OKX.AI ASP Agent Server
  - type: web
    name: solana-mev-agent-okx
    env: node
    region: oregon
    plan: free
    branch: main
    rootDir: .
    buildCommand: echo "No build required"
    startCommand: node okx-agent-server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
    healthCheckPath: /health
    autoDeploy: true
